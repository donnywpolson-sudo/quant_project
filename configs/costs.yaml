version: 1

# Market coverage follows configs/alpha_tiered.yaml full_markets.
# Project-wide excluded: E7, J7, QI, QO, ZQ, PA.
#
# Cost model convention:
# - Dollar commission, exchange-fee recovery, regulatory-fee recovery, and
#   slippage are per contract per side.
# - round_turn_cost_* is for entry plus exit.
# - IBKR fee recovery pages are customer charges intended to offset exchange
#   and regulatory fees; they may differ from raw exchange member schedules.
cost_model:
  name: ibkr_non_member_cme_group_us_futures
  effective_date: 2026-06-14
  currency: USD
  broker: Interactive Brokers LLC
  broker_commission_per_contract_dollars: 0.85
  clearing_fee_dollars: 0.0
  regulatory_fee_dollars: 0.02
  slippage_ticks_per_side: 1.0
  slippage_source: approved_internal_model_assumption_2026-06-14
  live_fill_model_available: false
  live_fill_model_status: fixed_tick_slippage_research_assumption_only
  sources:
    ibkr_futures_commissions: https://www.interactivebrokers.com/en/pricing/commissions-futures.php
    ibkr_cme_fee_recovery: https://www.interactivebrokers.com/en/accounts/fees/CME.php
    ibkr_cbot_fee_recovery: https://www.interactivebrokers.com/en/accounts/fees/CBOT.php
    ibkr_comex_fee_recovery: https://www.interactivebrokers.com/en/accounts/fees/COMEX.php
    ibkr_nymex_fee_recovery: https://www.interactivebrokers.com/en/accounts/fees/NYMEX.php
    cme_fee_overview: https://www.cmegroup.com/company/clearing-fees.html

