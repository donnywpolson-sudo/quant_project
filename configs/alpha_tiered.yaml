default_profile: tier_1_research

paths:
  raw_root: data/raw
  causal_base_root: data/causally_gated_normalized
  labeled_root: data/labeled
  feature_matrix_root: data/feature_matrices
  predictions_root: data/predictions
  executions_root: data/executions
  frozen_features_root: data/frozen_features
  reports_root: reports

defaults:
  downloaded_years: &downloaded_years [2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026]

  recent_years: [2023, 2024, 2025]
  long_years: [2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  long_research_years: &long_research_years [2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024]
  forward_years: &forward_years [2026]

  research_years: &research_years [2023, 2024]
  final_holdout_years: &final_holdout_years [2025]

  core_markets: &core_markets ["CL", "ES", "ZN"]
  full_markets: &full_markets ["ES", "NQ", "RTY", "YM", "CL", "NG", "RB", "HO", "GC", "SI", "HG", "PL", "SR3", "ZT", "ZF", "ZN", "ZB", "UB", "6A", "6B", "6C", "6E", "6J", "6M", "6N", "6S", "ZC", "ZS", "ZW", "LE", "HE"]

  core_market_families: &core_market_families
    CL: energy
    ES: equity_index
    ZN: rates

  full_market_families: &full_market_families
    ES: equity_index
    NQ: equity_index
    RTY: equity_index
    YM: equity_index
    CL: energy
    NG: energy
    RB: energy
    HO: energy
    GC: metals
    SI: metals
    HG: metals
    PL: metals
    SR3: rates
    ZT: rates
    ZF: rates
    ZN: rates
    ZB: rates
    UB: rates
    6A: fx
    6B: fx
    6C: fx
    6E: fx
    6J: fx
    6M: fx
    6N: fx
    6S: fx
    ZC: ag_livestock
    ZS: ag_livestock
    ZW: ag_livestock
    LE: ag_livestock
    HE: ag_livestock

  entry_lag_bars: 1
  target_horizon_bars: 15
  trend_horizon_bars: 30
  purge_bars: auto
  resolved_purge_bars: 16

  roll_window_bars: 15
  max_synthetic_gap_minutes: 120

  atr_window_bars: 60
  profit_atr_mult: 0.50
  stop_atr_mult: 1.00
  trend_adverse_atr_mult: 1.50

  require_roll_metadata_for_profiles:
    - tier_1_research
    - tier_1_holdout
    - tier_1_forward
    - tier_2_research
    - tier_2_holdout
    - tier_2_forward
    - tier_3_research
    - tier_3_holdout
    - tier_3_forward

profile_defaults:
  smoke:
    train_days: 90
    test_days: 15
    step_days: 15
    max_synthetic_rows_pct: 5.0
    max_degraded_rows_pct: 5.0
    max_roll_window_rows_pct: 2.0

  recent_research:
    train_days: 365
    test_days: 30
    step_days: 30
    max_synthetic_rows_pct: 2.0
    max_degraded_rows_pct: 1.0
    max_roll_window_rows_pct: 1.0

  long_research:
    train_days: 730
    test_days: 30
    step_days: 30
    max_synthetic_rows_pct: 2.0
    max_degraded_rows_pct: 1.0
    max_roll_window_rows_pct: 1.0

  production_like:
    train_days: 730
    test_days: 30
    step_days: 30
    max_synthetic_rows_pct: 1.0
    max_degraded_rows_pct: 0.5
    max_roll_window_rows_pct: 1.0

profile_requirements:
  production_like:
    require_market_config: true
    require_session_config: true
    require_roll_metadata: true
    require_cost_config: false
    allow_missing_raw_files: false
    allow_hardcoded_calendar: false
    allow_metadata_optional: false

  research_only:
    require_market_config: true
    require_session_config: true
    require_roll_metadata: true
    require_cost_config: false
    allow_missing_raw_files: false
    allow_hardcoded_calendar: false
    allow_metadata_optional: false

  test_only:
    require_market_config: false
    require_session_config: false
    require_roll_metadata: false
    require_cost_config: false
    allow_missing_raw_files: false
    allow_hardcoded_calendar: true
    allow_metadata_optional: true

  inventory_only:
    require_market_config: false
    require_session_config: false
    require_roll_metadata: false
    require_cost_config: false
    allow_missing_raw_files: true
    allow_hardcoded_calendar: true
    allow_metadata_optional: true

profiles:
  tier_0:
    description: "Smoke test: ES, 2025."
    intent: smoke_test
    requirement_set: production_like
    settings_profile: smoke
    markets: ["ES"]
    years: [2025]

  metadata_optional_test:
    description: "Unit-test-only relaxed raw schema."
    intent: unit_test_only
    requirement_set: test_only
    settings_profile: smoke
    markets: ["ES"]
    years: [2024]
    forbid_research_use: true

  tier_1_research:
    description: "Core research: CL/ES/ZN, 2023-2024."
    intent: core_recent_research
    requirement_set: production_like
    settings_profile: recent_research
    markets: *core_markets
    years: *research_years
    market_families: *core_market_families

  tier_1_holdout:
    description: "Core holdout: CL/ES/ZN, 2025."
    intent: core_final_holdout
    requirement_set: production_like
    settings_profile: recent_research
    markets: *core_markets
    years: *final_holdout_years
    forbid_research_use: true
    market_families: *core_market_families

  tier_1_forward:
    description: "Core forward: CL/ES/ZN, 2026."
    intent: core_forward_validation
    requirement_set: production_like
    settings_profile: recent_research
    markets: *core_markets
    years: *forward_years
    forbid_research_use: true
    market_families: *core_market_families

  tier_2_research:
    description: "Core long research: CL/ES/ZN, 2010-2024."
    intent: core_long_research
    requirement_set: production_like
    settings_profile: long_research
    markets: *core_markets
    years: *long_research_years
    market_families: *core_market_families

  tier_2_holdout:
    description: "Core long holdout: CL/ES/ZN, 2025."
    intent: core_long_final_holdout
    requirement_set: production_like
    settings_profile: long_research
    markets: *core_markets
    years: *final_holdout_years
    forbid_research_use: true
    market_families: *core_market_families

  tier_2_forward:
    description: "Core long forward: CL/ES/ZN, 2026."
    intent: core_long_forward_validation
    requirement_set: production_like
    settings_profile: long_research
    markets: *core_markets
    years: *forward_years
    forbid_research_use: true
    market_families: *core_market_families

  tier_3_research:
    description: "Full-universe research: 31 markets, 2010-2024."
    intent: full_universe_long_research
    requirement_set: production_like
    settings_profile: long_research
    markets: *full_markets
    years: *long_research_years
    requires_all_market_configs: true
    requires_cost_configs: true
    market_families: *full_market_families

  tier_3_holdout:
    description: "Full-universe holdout: 31 markets, 2025."
    intent: full_universe_final_holdout
    requirement_set: production_like
    settings_profile: long_research
    markets: *full_markets
    years: *final_holdout_years
    forbid_research_use: true
    requires_all_market_configs: true
    requires_cost_configs: true
    market_families: *full_market_families

  tier_3_forward:
    description: "Full-universe forward: 31 markets, 2026."
    intent: full_universe_forward_validation
    requirement_set: production_like
    settings_profile: long_research
    markets: *full_markets
    years: *forward_years
    forbid_research_use: true
    requires_all_market_configs: true
    requires_cost_configs: true
    market_families: *full_market_families

  all_raw:
    description: "Inventory every discovered raw parquet file."
    intent: inventory_only
    requirement_set: inventory_only
    settings_profile: smoke
    discovery: true
    forbid_research_use: true

aliases:
  tier_0_smoke: tier_0
  tier_1: tier_1_research
  tier_1_core: tier_1_research
  tier_1_core_recent: tier_1_research
  tier_1_recent: tier_1_research
  tier_1_final_holdout: tier_1_holdout
  tier_1_forward_2026: tier_1_forward
  tier_1_long: tier_2_research
  tier_1_core_long: tier_2_research
  tier_2: tier_2_research
  tier_2_long: tier_2_research
  tier_2_final_holdout: tier_2_holdout
  tier_2_forward_2026: tier_2_forward
  tier_3: tier_3_research
  tier_3_final_holdout: tier_3_holdout
  tier_3_forward_2026: tier_3_forward
  all_raw: all_raw
